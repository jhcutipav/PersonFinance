<!DOCTYPE html>

  <title>FinanzApp</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/transacciones.css">
  <link rel="stylesheet" href="css/tarjetas.css">
  <link rel="stylesheet" href="css/gastosFijos.css">
  <link rel="stylesheet" href="css/presupuestos.css">
  <link rel="stylesheet" href="css/deudas.css">

  <link rel="stylesheet" href="css/reportes.css">
  <link rel="stylesheet" href="css/config-pages.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/onboarding.css">
  <link rel="stylesheet" href="css/transferencias.css">
  <link rel="stylesheet" href="css/modal.css">
  
  <!-- Chart.js desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- Auroras (sutiles en claro, visibles en oscuro) -->
  <div class="aurora aurora-purple"></div>
  <div class="aurora aurora-cyan"></div>
  <div class="aurora aurora-pink"></div>

  <div class="app-container">
    
    <!-- SIDEBAR (v13 — sin flecha, logo abre/cierra, avatar resetea) -->
    <aside class="sidebar" id="sidebar">
      <!-- Header con logo (clickeable para expandir/colapsar) -->
      <div class="sidebar-header">
        <div class="logo-wrap" id="sidebarLogoToggle" title="Click para expandir/colapsar el menú">
          <div class="logo">💎</div>
          <div class="logo-textblock">
            <div class="logo-text">FinanzApp</div>
            <div class="logo-subtitle">Finanzas personales</div>
          </div>
        </div>
      </div>
      
      <button class="sidebar-close" id="sidebarClose" aria-label="Cerrar">✕</button>
      
      <!-- Navegación principal -->
      <div class="sidebar-section-title">Menú</div>
      <nav class="nav">
        <a href="#dashboard" class="nav-item active" data-page="dashboard" data-label="Dashboard">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="#transacciones" class="nav-item" data-page="transacciones" data-label="Transacciones">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
          <span>Transacciones</span>
        </a>
        <a href="#tarjetas" class="nav-item" data-page="tarjetas" data-label="Tarjetas">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
          <span>Tarjetas</span>
        </a>
        <a href="#presupuestos" class="nav-item" data-page="presupuestos" data-label="Presupuestos">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          <span>Presupuestos</span>
        </a>
        <a href="#gastos-fijos" class="nav-item" data-page="gastos-fijos" data-label="Gastos fijos">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span>Gastos fijos</span>
        </a>
        <a href="#deudas" class="nav-item" data-page="deudas" data-label="Deudas">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span>Deudas</span>
        </a>
        <a href="#metas" class="nav-item" data-page="metas" data-label="Metas">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
          <span>Metas</span>
        </a>
        <a href="#transferencias" class="nav-item" data-page="transferencias" data-label="Transferencias">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
          <span>Transferencias</span>
        </a>
        <a href="#reportes" class="nav-item" data-page="reportes" data-label="Reportes">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2"/></svg>
          <span>Reportes</span>
        </a>
      </nav>
      
      <!-- Footer del sidebar: settings, ayuda, notificaciones, user -->
      <div class="sidebar-footer">
        <a href="#configuracion" class="nav-item" data-page="configuracion" data-label="Configuración">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>

        </a>
        <a href="#ayuda" class="nav-item" data-page="ayuda" data-label="Ayuda">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span>Ayuda</span>
        </a>
        <a href="#notificaciones" class="nav-item nav-item-with-badge" data-page="notificaciones" data-label="Notificaciones">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <span>Notificaciones</span>
          <span class="nav-badge" id="navBadgeNotifs">0</span>
        </a>
        
        <!-- User card en el bottom -->
        <div class="sidebar-user-card" id="sidebarUserCard">
          <div class="sidebar-user-avatar" id="sidebarUserAvatar">D</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sidebarUserName">Daniel</div>
            <div class="sidebar-user-email" id="sidebarVersionLabel">v—</div>
          </div>
          <div class="sidebar-user-status"></div>
        </div>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- MAIN -->
    <main class="main">
      
      <header class="header">
        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        
        <!-- Búsqueda -->
        <div class="header-search">
          <span class="header-search-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </span>
          <input type="text" placeholder="Buscar..." id="globalSearch">
        </div>
        
        <!-- Fecha -->
        <div class="header-date">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <span id="headerDate">Cargando...</span>
        </div>
        
        <!-- Selector de moneda -->
        <select id="currencyView" class="currency-select">
          <option value="PEN">S/</option>
          <option value="USD">US$</option>
          <option value="ALL">Cada uno</option>
        </select>
        
        <!-- Toggle tema -->
        <button class="header-icon-btn theme-toggle" id="themeToggle" aria-label="Cambiar tema">
          <svg class="sun-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg class="moon-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        
        <!-- Notificaciones -->
        <button class="header-icon-btn" aria-label="Notificaciones">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <span class="badge-dot"></span>
        </button>
        
        <!-- Botón Nueva -->
        <button class="btn-primary" id="btnNuevaTransaccion">
          <span class="btn-icon">+</span>
          <span>Nueva</span>
        </button>
        
        <!-- Perfil -->
        <div class="header-profile">
          <div class="header-profile-avatar" id="profileAvatar">D</div>
          <div class="header-profile-info">
            <div class="header-profile-name" id="profileName">Usuario</div>
            <div class="header-profile-tier">Premium</div>
          </div>
        </div>
      </header>

      <div id="pageContent" class="page-content"></div>
      
    </main>
  </div>

  <!-- Scripts -->
  <!-- 1. Utilidades -->
  <script src="js/utils/theme.js"></script>
  <script src="js/utils/formato.js"></script>

  <!-- 3. Componentes -->

  <script src="js/components/colorPicker.js"></script>
  
  <!-- 4. Gráficos (después de chart.js de CDN, antes de páginas que los usan) -->

  <!-- 5. Páginas -->
  <script src="js/pages/categorias.js"></script>
  <script src="js/pages/transaccionForm.js"></script>

  <script src="js/pages/deudaForm.js"></script>
  <script src="js/pages/deudas.js"></script>
  <script src="js/pages/metaForm.js"></script>
  <script src="js/pages/metas.js"></script>
  <script src="js/pages/reportes.js"></script>

  <script src="js/pages/configuracion.js"></script>
  <script src="js/pages/ayuda.js"></script>
  <script src="js/pages/notificaciones.js"></script>

  <script src="js/auth/auth.js"></script>
  <script src="js/auth/login.js"></script>
  <script src="js/auth/onboarding.js"></script>
  <script src="js/pages/dashboard.js"></script>
  
  <!-- 6. App principal -->
  <script src="js/app.js"></script>
</body>
</html>
